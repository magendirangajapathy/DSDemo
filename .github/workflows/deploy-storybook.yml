name: Deploy Storybook

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Storybook
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook static
        run: npm run build-storybook

      - name: Upload Storybook artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: storybook-static

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Check Pages enabled
        id: check
        run: |
          if curl -sSf -H "Accept: application/vnd.github+json" https://api.github.com/repos/${{ github.repository }}/pages >/dev/null 2>&1; then
            echo "pages_enabled=true" >> $GITHUB_OUTPUT
          else
            echo "pages_enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy
        if: steps.check.outputs.pages_enabled == 'true'
        uses: actions/deploy-pages@v5.0.0

      - name: Pages not enabled (skip deploy)
        if: steps.check.outputs.pages_enabled != 'true'
        run: |
          echo "GitHub Pages is not enabled for this repository. Enable it at https://github.com/${{ github.repository }}/settings/pages to allow automatic deployment."
